name: Deploy to GitHub Pages

on:
  push:
    branches: [main, investigation]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ── main branch → deploy/ (root) ──
      - uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: main-src/package-lock.json

      - name: Build main
        working-directory: main-src
        run: |
          npm ci
          npm run build

      - name: Stage main build
        run: |
          mkdir -p deploy
          cp -R main-src/dist/. deploy/

      # ── investigation branch → deploy/investigation/ ──
      - uses: actions/checkout@v4
        with:
          ref: investigation
          path: investigation-src

      - name: Build investigation
        working-directory: investigation-src
        env:
          VITE_BASE: /puzzle-graph/investigation/
        run: |
          npm ci
          npm run build

      - name: Stage investigation build
        run: |
          mkdir -p deploy/investigation
          cp -R investigation-src/dist/. deploy/investigation/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
